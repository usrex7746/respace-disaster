        }
        window.onclick = function(event) { 
            if (!event.target.matches('.globe-icon')) document.getElementById('langMenu').classList.remove('show');

        function switchLang(lang) {
            currentLang = lang;
            const t = i18n[lang];
            
            document.getElementById('header-text').innerText = t.header;
            document.getElementById('main-title').innerText = t.header;
            
            document.getElementById('label-Player').innerText = t.labelPlayer;

            document.getElementById('info-title').innerText = t.infoTitle;
            document.getElementById('info-desc').innerText = t.infoDesc;
            document.getElementById('info-powered').innerHTML = t.infoPowered;
            document.getElementById('info-contact').innerText = t.infoContact;

                if (input.dataset.item) { input.value = JSON.parse(input.dataset.item)[lang]; }

            if (pool[type].length === 0) pool[type] = shuffleArray([...masterLibrary[type]]);

            document.getElementById('input' + type).value = item[currentLang];
            document.getElementById('input' + type).dataset.item = JSON.stringify(item);

        let userAnswers = ["", "", "", "", ""];
        let aiAnswers = []; 
        let lastEvaluationData = null; 

        // 3. LLM 浪漫彩蛋逻辑
        let hasFiredLLM = false;
        function checkEasterEgg() {
            const val = document.getElementById('playerName').value.trim().toUpperCase();
            if (val === 'LLM' && !hasFiredLLM) {
                hasFiredLLM = true;
                let times = 0;
                // 每隔 800ms 绽放一次，共 3 次
                const fire = setInterval(() => {
                    confetti({
                        particleCount: 100,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#d4b886', '#ff6b6b', '#1dd1a1', '#ffffff'],
                        zIndex: 9999
                    });
                    times++;
                    if (times >= 3) clearInterval(fire);
                }, 800);
            } else if (val !== 'LLM') {
                hasFiredLLM = false; // 删除了 LLM 重置状态，下次打字还能触发
            }
        }

        function validatePlayerName() {
            const pName = document.getElementById('playerName').value.trim();
            if(!pName) { alert(i18n[currentLang].alertEmptyName); return false; }
            return true;
        }

        function validateAnswers(answersArray) {
            if (answersArray.some(a => !a || a.trim() === "")) { alert(i18n[currentLang].alertEmptyAns); return false; }
            return true;
        }

        function goToAnswerView() {
            if(!validatePlayerName()) return;
            const valA = document.getElementById('inputA').value.trim(); 
            const valB = document.getElementById('inputB').value.trim();
            if(!valA || !valB) return alert(i18n[currentLang].alertEmptyAB);
            document.getElementById('target-b-text').innerText = valB;
            document.getElementById('view-setup').classList.remove('active'); document.getElementById('view-answer').classList.add('active');
            renderCascadeUI();
        }
        
        function goToSetupView() { 
            document.getElementById('playerName').value = "";
            document.getElementById('inputA').value = "";
            document.getElementById('inputB').value = "";
            userAnswers = ["", "", "", "", ""];
            aiAnswers = [];
            lastEvaluationData = null;
            hasFiredLLM = false;

            document.getElementById('view-answer').classList.remove('active'); 
            document.getElementById('view-setup').classList.add('active'); 
        }
        
        function renderCascadeUI() {
            const container = document.getElementById('cascade-container'); container.innerHTML = '';
            const t = i18n[currentLang]; 
            const targetB = document.getElementById('target-b-text').innerText;
            let currentQ = document.getElementById('inputA').value;
            
            for(let i=0; i<5; i++) {
                if(i > 0 && userAnswers[i-1] === "") currentQ = "___"; else if (i > 0) currentQ = userAnswers[i-1];
                let qTextHTML = i < 4 
                    ? `${i+1}. ${t.whyPrefix} <span id="q-text-${i}" class="q-highlight">${currentQ}</span> ${t.whySuffix}` 
                    : `5. 🎯 ${t.whyFinalPrefix} <span id="q-text-${i}" class="q-highlight">${currentQ}</span> ${t.whyFinalSuffix} <span class="q-final">${targetB}</span> ？`;

                const html = `
                    <div class="cascade-item">
                        <div class="q-row">${qTextHTML}</div>
                        <div class="input-wrapper">
                            <div class="input-prefix">${t.becausePrefix}</div>
                            <input type="text" id="a-input-${i}" value="${userAnswers[i]}" oninput="updateNextQ(${i})">
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', html);
            }
        }
        
        function updateNextQ(idx) {
            const val = document.getElementById(`a-input-${idx}`).value; userAnswers[idx] = val;
            if (idx < 4) { const nq = document.getElementById(`q-text-${idx + 1}`); if(nq) nq.innerText = val === "" ? "___" : val; }
        }

        function openInfoModal() { document.getElementById('info-modal').classList.add('active'); }
        function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); }

        let typewriterTimer;
        function startLoadingUI() {
            const resultBox = document.getElementById('ai-result');
            const loadingBox = document.getElementById('ai-loading-text');
            resultBox.style.display = 'none';
            loadingBox.style.display = 'block';
            loadingBox.innerHTML = '';
            
            const msgs = loadingMsgs[currentLang];
            let line = 0, charIdx = 0;
            let currentLineDiv = document.createElement('div');
            loadingBox.appendChild(currentLineDiv);

            // 2. 将打字速度降频：时间间隔延长一倍 (120ms)
            typewriterTimer = setInterval(() => {
                if (line >= msgs.length) { clearInterval(typewriterTimer); return; }
                if (charIdx < msgs[line].length) {
                    currentLineDiv.innerHTML += msgs[line].charAt(charIdx);
                    charIdx++;
                } else {
                    line++; charIdx = 0;
                    if (line < msgs.length) {
                        currentLineDiv = document.createElement('div');
                        loadingBox.appendChild(currentLineDiv);
                    }
                }
                const cursors = loadingBox.querySelectorAll('.cursor-blink');
                cursors.forEach(c => c.remove());
                currentLineDiv.innerHTML += '<span class="cursor-blink"></span>';
            }, 120); 
        }

        function stopLoadingUI() {
            clearInterval(typewriterTimer);
            document.getElementById('ai-loading-text').style.display = 'none';
            document.getElementById('ai-result').style.display = 'block';
        }

async function fetchGemini(p) {
            document.getElementById('ai-modal').classList.add('active');
            startLoadingUI();
            
            // 【改动核心】：请求地址变成了我们自己的 Vercel 接口
            const url = 'https://respace-disaster.com/api/gemini';
            
            try {
                const response = await fetch(url, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    // 这里我们只需要把 prompt 传给后端，复杂的结构在后端组装
                    body: JSON.stringify({ prompt: p }) 
                });
                
                if (response.status === 429) { 
                    alert("API 请求过于频繁，请稍后再试。"); 
                    closeModal('ai-modal'); stopLoadingUI(); return null; 
                }
                if (!response.ok) { 
                    alert(`Network Error (${response.status})`); 
                    closeModal('ai-modal'); stopLoadingUI(); return null; 
                }
                
                const data = await response.json();
                stopLoadingUI();

                if (!data.candidates || data.candidates.length === 0) { 
                    alert("API returned empty data."); closeModal('ai-modal'); return null; 
                }

                // 解析返回的文本
                let rawText = data.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
                return JSON.parse(rawText);
            } catch (error) { 
                alert(`Error: ${error.message}`); 
                closeModal('ai-modal'); stopLoadingUI(); return null; 
            }
        }

        async function callAskAI() {
            if(!validatePlayerName()) return;
            const t = i18n[currentLang];
            const valA = document.getElementById('inputA').value.trim(); 
            const valB = document.getElementById('inputB').value.trim();
            if(!valA || !valB) return alert(t.alertEmptyAB);
            document.getElementById('modal-title').innerText = t.aiTitleAsk;
            
            const prompt = `Lean Operations Expert. Language: ${currentLang}. 
            Target: Connect micro event "${valA}" to macro disaster "${valB}" in exact 5 causal steps. 
            Rule 1: Focus on system/management (Poka-yoke, SOP). 
            Rule 2: EXTREMELY CONCISE. Maximum 15 words per step. DO NOT explain, just state the direct short cause.
            Output JSON format ONLY: { "whys": ["short cause 1", "short cause 2", "short cause 3", "short cause 4", "short cause 5"] }`;
            
            const result = await fetchGemini(prompt);
            
            if(result && result.whys) { 
                aiAnswers = result.whys; 
                let html = ""; let currentQ = valA;
                
                for(let i=0; i<5; i++) {
                    let qTextHTML = i < 4 ? `${i+1}. ${t.whyPrefix} <span class="q-highlight">${currentQ}</span> ${t.whySuffix}` : `5. 🎯 ${t.whyFinalPrefix} <span class="q-highlight">${currentQ}</span> ${t.whyFinalSuffix} <span class="q-final">${valB}</span> ？`;
                    html += `<div class="ai-step"><div class="q-row" style="color:#aaa;margin-bottom:8px;">${qTextHTML}</div><div style="color:var(--text-accent);font-weight:500;"><span style="color:#888;">${t.becausePrefix}</span> ${aiAnswers[i]}</div></div>`;
                    currentQ = aiAnswers[i];
                }

                html += `<div class="btn-group" style="margin-top: 30px;"><button class="btn btn-action" onclick="callGradeMe(aiAnswers)">${t.aiTitleGrade} (${t.aiSelfGrade})</button></div>`;
                document.getElementById('ai-result').innerHTML = html; 
            }
        }

        async function callGradeMe(answersArray) {
            const t = i18n[currentLang];
            const pName = document.getElementById('playerName').value.trim();
            const valA = document.getElementById('inputA').value.trim(); 
            const valB = document.getElementById('inputB').value.trim();
            
            document.getElementById('ai-modal').classList.add('active');
            document.getElementById('modal-title').innerText = t.aiTitleGrade;
            
            const prompt = `Strict Lean Grader. Language: ${currentLang}. Event A "${valA}" -> B "${valB}". 5Whys to grade: [${answersArray.join(" -> ")}]. Critera: 1. Logical leaps? 2. Step 5 causes B? 3. Blame humans instead of systems? Output JSON ONLY: { "score": 85, "critique": "Sharp critique paragraph..." }`;
            const result = await fetchGemini(prompt);
            
            if(result) { 
                lastEvaluationData = { name: pName, statusA: valA, resultB: valB, whys: answersArray, score: result.score, critique: result.critique };
                
                document.getElementById('ai-result').innerHTML = `
                    <div style="text-align:center;"><div class="score-circle">${result.score}</div></div>
                    <div class="ai-step"><strong>${t.critiqueTitle}</strong><br><br>${result.critique}</div>
                    <div class="btn-group" style="margin-top: 30px;">
                        <button class="btn btn-action" onclick="exportReportPDF()">${t.btnExport}</button>
                    </div>
                `; 
            }
        }

        function exportReportPDF() {
            if(!lastEvaluationData) return;
            const d = lastEvaluationData;
            const t = i18n[currentLang];
            
            const printArea = document.createElement('div');
            
            let whysHtml = d.whys.map((w, idx) => `
                <div style="margin-bottom: 15px; padding: 15px; background: rgba(0,0,0,0.5); border-left: 3px solid #d4b886; border-radius: 6px;">
                    <strong style="color: #d4b886;">${t.stepPrefix} ${idx + 1}:</strong> ${w}
                </div>
            `).join('');

            printArea.innerHTML = `
                <div style="background-color: #1e2126; color: #e0e0e0; font-family: Inter, sans-serif; min-height: 290mm; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column;">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h1 style="color: #d4b886; font-size: 32px; margin: 0;">${t.header}</h1>
                        <p style="color: #888; margin-top: 10px; font-size: 16px;">${t.labelPlayer} <strong style="color: #fff;">${d.name}</strong></p>
                    </div>
                    <div style="background: rgba(0,0,0,0.4); border: 1px dashed #3b4048; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
                        <div style="margin-bottom: 12px;"><strong style="color: #888;">[ ${t.labelA} ]</strong> <span style="color: #fff; margin-left: 10px;">${d.statusA}</span></div>
                        <div><strong style="color: #888;">[ ${t.labelB} ]</strong> <span style="color: #fff; margin-left: 10px;">${d.resultB}</span></div>
                    </div>
                    <h3 style="color: #d4b886; border-bottom: 1px solid #3b4048; padding-bottom: 8px; margin-bottom: 20px;">5 WHYs ANALYSIS</h3>
                    ${whysHtml}
                </div>

                <div class="html2pdf__page-break"></div>

                <div style="background-color: #1e2126; color: #e0e0e0; font-family: Inter, sans-serif; min-height: 290mm; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column;">
                    <h3 style="color: #d4b886; border-bottom: 1px solid #3b4048; padding-bottom: 8px; margin-bottom: 20px;">EVALUATION SCORE</h3>
                    <div style="text-align: center; margin: 20px 0;">
                        <div style="display: inline-block; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; background: #d4b886; color: #000; font-size: 32px; font-weight: bold;">${d.score}</div>
                    </div>
                    <div style="background: rgba(0,0,0,0.5); padding: 25px; border-radius: 8px; border-left: 4px solid #d4b886; margin-bottom: 30px; flex-grow: 1;">
                        <strong style="color: #d4b886; font-size: 18px;">${t.critiqueTitle}</strong><br><br><span style="line-height: 1.8; font-size: 15px;">${d.critique}</span>
                    </div>
                    <div style="text-align: center; color: #666; font-size: 12px; border-top: 1px solid #3b4048; padding-top: 20px;">
                        Generated by ${t.header} | Powered by Gemini AI
                    </div>
                </div>
            `;

            const opt = {
                margin:       0,
                filename:     `5Why_Report_${d.name}.pdf`,
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(printArea).save();
        }

        window.onload = function() { switchLang('zh'); };
    </script>
</body>
</html>
