<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Respace Disaster - Access</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root {
            --bg-color: #000000;
            --text-offwhite: #F9F8F4;
            --text-dim: rgba(249, 248, 244, 0.5);
            --accent-green: #37ff00;
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-offwhite);
            font-family: 'Inter', -apple-system, sans-serif;
            width: 100%; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .header-left { position: fixed; top: 2.5rem; left: 3rem; z-index: 1001; cursor: pointer; }
        .logo-svg { width: 35px; height: 35px; transition: 0.3s; }
        .top-nav {
            position: fixed; top: 2.5rem; right: 3rem;
            display: flex; align-items: center; gap: 2.5rem; z-index: 1000;
        }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a {
            color: var(--text-offwhite); text-decoration: none; font-size: 0.85rem;
            letter-spacing: 0.3rem; opacity: 0.5; transition: 0.4s;
        }
        .nav-links a:hover { opacity: 1; }

        .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
        .nav-icon { width: 26px; height: 26px; stroke: var(--text-offwhite); fill: none; stroke-width: 1.5; opacity: 0.7; transition: 0.3s; cursor: pointer; }

        .lang-control { position: relative; }
        .lang-menu {
            position: absolute; right: 0; top: 3.5rem; background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(25px); padding: 1.2rem; display: none; flex-direction: column; gap: 1.2rem;
            border: 1px solid var(--glass-border); min-width: 130px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lang-menu span { font-size: 0.7rem; letter-spacing: 0.15rem; opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .lang-menu span:hover { opacity: 1; color: #fff; }

        .comet-canvas {
            position: absolute; top: 50%; left: 55%; transform: translate(-50%, -50%);
            width: 120vh; height: 120vh; z-index: 0; pointer-events: none; opacity: 0.15;
        }
        .trail-path { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 1800; stroke-dashoffset: 1800; animation: growTrail 11s forwards; }
        @keyframes growTrail { to { stroke-dashoffset: 0; } }

        .auth-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; padding: 0 2rem; }
        .auth-box { 
            width: 100%; max-width: 450px; text-align: center; 
            animation: contentFade 3s ease-out;
        }
        
        .auth-box h2 { 
            font-size: 2.2rem; font-weight: 100; letter-spacing: 1.5rem; 
            text-transform: uppercase; margin: 0 0 2rem 0; transform: translateX(0.75rem);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
        
        @keyframes contentFade { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .auth-desc { font-size: 0.75rem; letter-spacing: 0.1rem; color: var(--text-dim); margin-bottom: 4rem; font-weight: 300; line-height: 1.6; }
        .auth-step { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .auth-step.active { display: block; opacity: 1; }

        .form-group { position: relative; margin-bottom: 3rem; text-align: left; }
        .auth-box input {
            width: 100%; background: none; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-offwhite); font-family: inherit; font-size: 1rem; padding: 10px 40px 10px 0; letter-spacing: 0.1rem; transition: 0.3s;
        }
        .auth-box input:focus { outline: none; border-bottom-color: var(--text-offwhite); }
        .auth-box label { position: absolute; left: 0; top: 12px; font-size: 0.8rem; letter-spacing: 0.2rem; color: var(--text-dim); transition: 0.3s; pointer-events: none; }
        input:focus ~ label, input:not(:placeholder-shown) ~ label { top: -18px; font-size: 0.65rem; color: var(--text-offwhite); }

        .eye-toggle { position: absolute; right: 0; top: 10px; cursor: pointer; opacity: 0.4; }
        .submit-btn { width: 100%; background: none; border: none; color: var(--text-offwhite); padding: 1.5rem; font-size: 0.85rem; font-weight: 300; text-transform: uppercase; letter-spacing: 0.6rem; cursor: pointer; transition: 0.4s; }
        .submit-btn:hover { opacity: 0.6; }

        .footer-links { margin-top: 2.5rem; display: flex; flex-direction: column; gap: 1.2rem; align-items: center; }
        .text-btn { background: none; border: none; color: var(--text-dim); font-size: 0.65rem; letter-spacing: 0.15rem; text-transform: uppercase; cursor: pointer; opacity: 0.6; transition: 0.3s; text-decoration: none; }
        .text-btn:hover { color: var(--text-offwhite); opacity: 1; }

        .divider-container { text-align: center; margin: 3.5rem 0; position: relative; }
        .divider-line { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255, 255, 255, 0.15); z-index: 0; }
        .divider-text { background: var(--bg-color); padding: 0 1.5rem; color: var(--text-dim); font-size: 0.65rem; letter-spacing: 0.4rem; position: relative; z-index: 1; }

        @media (max-width: 768px) {
            .top-nav { position: fixed !important; top: 0; left: 0; right: 0; width: 100%; background-color: rgba(0,0,0,0.95); padding: 1.5rem 2rem; flex-direction: row; justify-content: flex-end; gap: 1.5rem; z-index: 2000; }
            .nav-links { display: none; }
            .header-left { top: 1.5rem; left: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="comet-canvas">
        <svg viewBox="0 0 1000 1000" style="width:100%; height:100%;">
            <defs><linearGradient id="cometGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:var(--text-offwhite); stop-opacity:0" /><stop offset="100%" style="stop-color:var(--text-offwhite); stop-opacity:0.4" /></linearGradient></defs>
            <path class="trail-path" d="M 950 100 C 400 300 400 700 950 900" stroke="url(#cometGrad)" />
        </svg>
    </div>

    <div class="header-left" onclick="location.href='index.html'">
        <svg class="logo-svg" viewBox="0 0 100 100"><path d="M30 20 V80 M30 20 H55 Q75 20 75 40 T55 60 H30 M50 60 L75 85 M75 35 Q75 50 55 50 T35 65" fill="none" stroke="#F9F8F4" stroke-width="8" stroke-linecap="round"/></svg>
    </div>

    <header class="top-nav">
        <nav class="nav-links">
            <a href="insight.html">INSIGHT</a>
            <a href="studio.html">STUDIO</a>
            <a href="education.html">EDUCATION</a>
            <a href="game/index.html">GAME</a>
        </nav>
        
        <div class="nav-actions">
            <div class="lang-control">
                <svg class="nav-icon" viewBox="0 0 24 24" id="langBtn"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                <div class="lang-menu" id="langMenu">
                    <span onclick="setLang('en')">ENGLISH</span>
                    <span onclick="setLang('zh')">中文</span>
                    <span onclick="setLang('jp')">日本語</span>
                    <span onclick="setLang('es')">ESPAÑOL</span>
                    <span onclick="setLang('fr')">FRANÇAIS</span>
                </div>
            </div>
            <a href="login.html" title="Sign In">
                <svg class="nav-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" style="opacity: 1; stroke-width: 1.8;">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="auth-box">
            <h2 data-i18n="auth_title">ACCESS</h2>
            
            <div id="step-email" class="auth-step active">
                <p class="auth-desc" data-i18n="email_desc">Enter email to connect to the Control Center.</p>
                <div class="form-group">
                    <input type="email" id="userEmail" placeholder=" " required>
                    <label for="userEmail" data-i18n="label_email">EMAIL ADDRESS</label>
                </div>
                <button class="submit-btn" id="continueBtn" onclick="checkUser()" data-i18n="btn_continue">CONTINUE</button>
                <div class="divider-container"><div class="divider-line"></div><span class="divider-text" data-i18n="divider_or">OR</span></div>
                <div id="googleButtonContainer" style="display: flex; justify-content: center;"></div>
            </div>

            <div id="step-password" class="auth-step">
                <p class="auth-desc" id="passTitle" data-i18n="pass_desc_default">Identity verification required.</p>
                <div class="form-group">
                    <input type="password" id="userPassword" placeholder=" ">
                    <label for="userPassword" id="passLabel" data-i18n="label_pass">PASSWORD</label>
                    <div class="eye-toggle" onclick="togglePassword()">
                        <svg id="eyeIcon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                </div>
                <button class="submit-btn" id="authBtn" onclick="handleAuth()" data-i18n="btn_confirm">CONFIRM</button>
                <div class="footer-links">
                    <a class="text-btn" data-i18n="btn_forgot" onclick="alert('System Offline')">FORGOT PASSWORD?</a>
                    <a class="text-btn" data-i18n="btn_back" onclick="resetFlow()">← BACK</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const i18n = {
            en: { auth_title: "ACCESS", email_desc: "Enter email to connect to the Control Center.", label_email: "EMAIL ADDRESS", btn_continue: "CONTINUE", divider_or: "OR", pass_desc_default: "Identity verification required.", label_pass: "PASSWORD", btn_confirm: "CONFIRM", btn_forgot: "FORGOT PASSWORD?", btn_back: "← BACK", pass_new: "New account detected.", pass_welcome: "Welcome back.", label_create: "CREATE PASSWORD" },
            zh: { auth_title: "访问", email_desc: "输入邮箱以连接控制中心。", label_email: "电子邮箱地址", btn_continue: "继续", divider_or: "或", pass_desc_default: "需要身份验证。", label_pass: "密码", btn_confirm: "确认", btn_forgot: "忘记密码？", btn_back: "← 返回", pass_new: "检测到新账号。", pass_welcome: "欢迎回来。", label_create: "创建密码" },
            jp: { auth_title: "アクセス", email_desc: "コントロールセンターに接続するためのメールを入力してください。", label_email: "メールアドレス", btn_continue: "次へ", divider_or: "または", pass_desc_default: "本人確認が必要です。", label_pass: "パスワード", btn_confirm: "確認", btn_forgot: "パスワードを忘れた場合", btn_back: "← 戻る", pass_new: "新しいアカウントを検出しました。", pass_welcome: "おかえりなさい。", label_create: "パスワードを作成" },
            es: { auth_title: "ACCESO", email_desc: "Ingrese correo para conectar al Centro de Control.", label_email: "DIRECCIÓN DE CORREO", btn_continue: "CONTINUAR", divider_or: "O", pass_desc_default: "Verificación de identidad requerida.", label_pass: "CONTRASEÑA", btn_confirm: "CONFIRMAR", btn_forgot: "¿OLVIDÓ SU CONTRASEÑA?", btn_back: "← VOLVER", pass_new: "Nueva cuenta detectada.", pass_welcome: "Bienvenido de nuevo.", label_create: "CREAR CONTRASEÑA" },
            fr: { auth_title: "ACCÈS", email_desc: "Entrez votre email pour accéder au Centre de Contrôle.", label_email: "ADRESSE EMAIL", btn_continue: "CONTINUER", divider_or: "OU", pass_desc_default: "Vérification d'identité requise.", label_pass: "MOT DE PASSE", btn_confirm: "CONFIRMER", btn_forgot: "MOT DE PASSE OUBLIÉ ?", btn_back: "← RETOUR", pass_new: "Nouveau compte détecté.", pass_welcome: "Bon retour.", label_create: "CRÉER UN MOT DE PASSE" }
        };

        // --- 核心修复：相对路径识别 ---
        const API_BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:3000' : '';

        let isNewUser = false;
        const langBtn = document.getElementById('langBtn');
        const langMenu = document.getElementById('langMenu');

        langBtn.onclick = (e) => { e.stopPropagation(); langMenu.style.display = langMenu.style.display === 'flex' ? 'none' : 'flex'; };
        function setLang(l) { localStorage.setItem('respace_lang', l); applyLang(l); langMenu.style.display = 'none'; }
        function applyLang(l) {
            const set = i18n[l] || i18n.en;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(set[key]) el.innerText = set[key];
            });
            if(document.getElementById('step-password').style.display === 'block') {
                document.getElementById('passTitle').innerText = isNewUser ? set.pass_new : set.pass_welcome;
                document.getElementById('passLabel').innerText = isNewUser ? set.label_create : set.label_pass;
            }
        }

        function togglePassword() {
            const passInput = document.getElementById('userPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') { passInput.type = 'text'; eyeIcon.style.color = 'var(--accent-green)'; } 
            else { passInput.type = 'password'; eyeIcon.style.color = 'currentColor'; }
        }

        async function checkUser() {
            const email = document.getElementById('userEmail').value.trim();
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return;
            const btn = document.getElementById('continueBtn');
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE_URL}/api/check-user`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
                if(!res.ok) throw new Error("Connection failed");
                const result = await res.json();
                isNewUser = result.isNew;
                const l = localStorage.getItem('respace_lang') || 'en';
                applyLang(l);
                document.getElementById('step-email').classList.remove('active');
                setTimeout(() => {
                    document.getElementById('step-email').style.display = 'none';
                    document.getElementById('step-password').style.display = 'block';
                    void document.getElementById('step-password').offsetWidth;
                    document.getElementById('step-password').classList.add('active');
                    document.getElementById('userPassword').focus();
                }, 300);
            } catch (e) { alert("Backend Unreachable. Ensure API is deployed."); }
            finally { btn.disabled = false; }
        }

        async function handleAuth() {
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            const endpoint = isNewUser ? '/api/register' : '/api/login';
            try {
                const res = await fetch(`${API_BASE_URL}${endpoint}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                if (res.ok) window.location.href = `dashboard.html?email=${email}&isNew=${isNewUser}`;
                else { const r = await res.json(); alert(r.error); }
            } catch (e) { alert('Auth Failed'); }
        }

        function resetFlow() { location.reload(); }
        document.onclick = () => { langMenu.style.display = 'none'; };
        window.onload = () => {
            const savedLang = localStorage.getItem('respace_lang') || 'en';
            applyLang(savedLang);
            google.accounts.id.initialize({ client_id: "619088067618-pq0isp6slgl186o6u52lptsadrjrjn5q.apps.googleusercontent.com", callback: (r) => { /* Google Logic */ } });
            google.accounts.id.renderButton(document.getElementById("googleButtonContainer"), { type: "icon", theme: "filled_black", shape: "circle" });
        };
    </script>
</body>
</html>
