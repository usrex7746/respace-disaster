<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Respace Disaster</title>
    <meta name="description" content="Integrating disaster risk analysis, spatial systems, and digital technologies, Respace Disaster builds a resilience-centric platform for disaster mitigation. Supported by tech products, consulting, and education, we create a closed-loop ecosystem for disaster management and educational empowerment.">
    <meta http-equiv="content-language" content="en, zh, es, jp, fr">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root {
            --bg-color: #000000;
            --text-offwhite: #F9F8F4;
            --text-dim: rgba(249, 248, 244, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* 基础锁定：严格禁止横向滚动 */
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-offwhite);
            font-family: 'Inter', -apple-system, sans-serif;
            width: 100%; height: 100vh; overflow: hidden; /* 网页版锁定全屏 */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* 11s 彗星生长动画 */
        .comet-canvas {
            position: absolute; top: 50%; left: 55%; transform: translate(-50%, -50%);
            width: 120vh; height: 120vh; z-index: 1; pointer-events: none;
        }
        .trail-path {
            fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 1800; stroke-dashoffset: 1800;
            animation: growTrail 11s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes growTrail { to { stroke-dashoffset: 0; } }

        /* 顶部导航与 Logo */
        .header-left { position: fixed; top: 2.5rem; left: 3rem; z-index: 1001; }
        .logo-svg { width: 35px; height: 35px; opacity: 1; cursor: pointer; transition: 0.3s; }
        .logo-svg:hover { opacity: 0.7; }

        .top-nav {
            position: fixed; top: 2.5rem; right: 3rem; /* 桌面端保持标准间距 */
            display: flex; align-items: center; gap: 2.5rem; z-index: 1000;
        }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a {
            color: var(--text-offwhite); text-decoration: none; font-size: 0.85rem;
            letter-spacing: 0.3rem; opacity: 0.5; transition: 0.4s;
        }
        .nav-links a:hover { opacity: 1; }

        /* 右侧操作区：图标容器 */
        .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
        .nav-icon { width: 22px; height: 22px; stroke: var(--text-offwhite); fill: none; stroke-width: 1.2; opacity: 0.7; transition: 0.3s; cursor: pointer; }
        .nav-icon:hover { opacity: 1; }

        /* 语言系统界面 */
        .lang-control { position: relative; display: flex; align-items: center; }
        .lang-menu {
            position: absolute; right: 0; top: 2.5rem; background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px); padding: 1.2rem; display: none; flex-direction: column; gap: 1rem;
            border: 1px solid var(--glass-border);
        }
        .lang-menu span { font-size: 0.7rem; letter-spacing: 0.15rem; opacity: 0.4; transition: 0.3s; cursor: pointer; }
        .lang-menu span:hover { opacity: 1; }

        /* 用户登录入口 */
        .auth-control { display: flex; align-items: center; text-decoration: none; }

        /* 核心标题：对齐 INSIGHT 标准 */
        .page-header { text-align: center; z-index: 10; animation: contentFade 3s ease-out; }
        h1 { 
            font-size: 2.2rem; font-weight: 100; letter-spacing: 1.5rem; 
            text-transform: uppercase; margin: 0; 
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3); 
        }
        @keyframes contentFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 移动端修正补丁：冻结、垂直、左移与标题找回 --- */
        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; overflow-x: hidden; }

            /* 冻结顶栏，选项卡左移 */
            .top-nav {
                position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important;
                width: 100% !important; background-color: #000000 !important;
                padding: 1.5rem 4rem 3rem 0 !important; /* 增加右边距，防止选项卡贴边 */
                flex-direction: column !important; align-items: flex-end !important;
                gap: 1rem !important; z-index: 2000 !important;
            }
            .nav-links { flex-direction: column !important; align-items: flex-end !important; gap: 0.8rem !important; }
            .nav-links a { font-size: 0.75rem !important; letter-spacing: 0.1rem !important; }
            
            /* 保证移动端下图标容器横排并靠右 */
            .nav-actions { flex-direction: row !important; gap: 1.2rem !important; margin-top: 0.5rem; }

            .header-left { top: 1.5rem !important; left: 2.5rem !important; z-index: 2001 !important; }
            .logo-svg { width: 28px !important; height: 28px !important; }

            /* 标题：大幅下移避开冻挡区 */
            .page-header { margin-top: 22rem !important; margin-bottom: 5rem !important; position: relative; z-index: 10; }
            h1 { font-size: 1.4rem !important; letter-spacing: 0.6rem !important; }
        }
    </style>
</head>
<body>
    <div class="comet-canvas">
        <svg viewBox="0 0 1000 1000" style="width:100%; height:100%;">
            <defs><linearGradient id="cometGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:var(--text-offwhite); stop-opacity:0" /><stop offset="100%" style="stop-color:var(--text-offwhite); stop-opacity:0.4" /></linearGradient></defs>
            <path class="trail-path" d="M 950 100 C 400 300 400 700 950 900" stroke="url(#cometGrad)" />
        </svg>
    </div>

    <div class="header-left" onclick="location.href='index.html'">
        <svg class="logo-svg" viewBox="0 0 100 100"><path d="M30 20 V80 M30 20 H55 Q75 20 75 40 T55 60 H30 M50 60 L75 85 M75 35 Q75 50 55 50 T35 65" fill="none" stroke="#F9F8F4" stroke-width="8" stroke-linecap="round"/></svg>
    </div>

    <header class="top-nav">
        <nav class="nav-links">
            <a href="insight.html">INSIGHT</a>
            <a href="studio.html">STUDIO</a>
            <a href="education.html">EDUCATION</a>
            <a href="game/index.html">GAME</a>
        </nav>
        
        <div class="nav-actions">
            <div class="lang-control" onclick="toggleLangMenu(event)">
                <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                <div class="lang-menu" id="langMenu">
                    <span onclick="setLang('en')">ENGLISH</span>
                    <span onclick="setLang('zh')">中文</span>
                    <span onclick="setLang('jp')">日本語</span>
                    <span onclick="setLang('es')">ESPAÑOL</span>
                    <span onclick="setLang('fr')">FRANÇAIS</span>
                </div>
            </div>
            
            <a href="login.html" class="auth-control" title="Sign In / Register">
                <svg class="nav-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
        </div>
    </header>

    <div class="page-header"><h1 id="page-title">RESPACE DISASTER</h1></div>

    <script>
        // --- 全站语言系统 ---
        const translations = {
            en: "RESPACE DISASTER",
            zh: "RESPACE DISASTER", 
            jp: "RESPACE DISASTER",
            es: "RESPACE DISASTER",
            fr: "RESPACE DISASTER"
        };

        function setLang(l) {
            localStorage.setItem('respace_lang', l);
            applyLang(l);
            document.getElementById('langMenu').style.display = 'none';
        }

        function applyLang(l) {
            const title = translations[l] || translations.en;
            const titleEl = document.getElementById('page-title');
            if(titleEl) titleEl.innerText = title;
        }

        function toggleLangMenu(e) { e.stopPropagation(); const m = document.getElementById('langMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        
        window.onload = () => { applyLang(localStorage.getItem('respace_lang') || 'en'); };
        document.onclick = () => { document.getElementById('langMenu').style.display = 'none'; };
    </script>
</body>
</html>
