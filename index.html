<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respace Disaster</title>
    <meta name="description" content="Integrating disaster risk analysis, spatial systems, and digital technologies...">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root {
            --bg-color: #000000;
            --text-offwhite: #F9F8F4;
            --text-dim: rgba(249, 248, 244, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-offwhite);
            font-family: 'Inter', -apple-system, sans-serif;
            width: 100%; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .comet-canvas {
            position: absolute; top: 50%; left: 55%; transform: translate(-50%, -50%);
            width: 120vh; height: 120vh; z-index: 1; pointer-events: none;
        }
        .trail-path {
            fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 1800; stroke-dashoffset: 1800;
            animation: growTrail 11s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes growTrail { to { stroke-dashoffset: 0; } }

        .header-left { position: fixed; top: 2.5rem; left: 3rem; z-index: 1001; cursor: pointer; }
        .logo-svg { width: 35px; height: 35px; transition: 0.3s; }
        .logo-svg:hover { opacity: 0.7; }

        .top-nav {
            position: fixed; top: 2.5rem; right: 3rem;
            display: flex; align-items: center; gap: 2.5rem; z-index: 1000;
        }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a {
            color: var(--text-offwhite); text-decoration: none; font-size: 0.85rem;
            letter-spacing: 0.3rem; opacity: 0.5; transition: 0.4s;
        }
        .nav-links a:hover { opacity: 1; }

        .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
        .nav-icon { width: 22px; height: 22px; stroke: var(--text-offwhite); fill: none; stroke-width: 1.2; opacity: 0.7; transition: 0.3s; cursor: pointer; }
        .nav-icon:hover { opacity: 1; }

        .lang-control { position: relative; }
        .lang-menu {
            position: absolute; right: 0; top: 3rem; background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(25px); padding: 1.2rem; display: none; flex-direction: column; gap: 1.2rem;
            border: 1px solid var(--glass-border); min-width: 120px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lang-menu span { font-size: 0.7rem; letter-spacing: 0.15rem; opacity: 0.5; transition: 0.3s; cursor: pointer; white-space: nowrap; }
        .lang-menu span:hover { opacity: 1; color: #fff; }

        .page-header { text-align: center; z-index: 10; animation: contentFade 3s ease-out; }
        h1 { 
            font-size: 2.2rem; font-weight: 100; letter-spacing: 1.5rem; 
            text-transform: uppercase; margin: 0; 
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3); 
        }
        @keyframes contentFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .top-nav { position: fixed !important; top: 0; left: 0; right: 0; width: 100%; background-color: rgba(0,0,0,0.9); padding: 1.5rem 2rem; flex-direction: row; justify-content: flex-end; gap: 1.5rem; z-index: 2000; }
            .nav-links { display: none; }
            .header-left { top: 1.5rem; left: 1.5rem; }
            h1 { font-size: 1.4rem; letter-spacing: 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="comet-canvas">
        <svg viewBox="0 0 1000 1000" style="width:100%; height:100%;">
            <defs><linearGradient id="cometGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:var(--text-offwhite); stop-opacity:0" /><stop offset="100%" style="stop-color:var(--text-offwhite); stop-opacity:0.4" /></linearGradient></defs>
            <path class="trail-path" d="M 950 100 C 400 300 400 700 950 900" stroke="url(#cometGrad)" />
        </svg>
    </div>

    <div class="header-left" onclick="location.href='index.html'">
        <svg class="logo-svg" viewBox="0 0 100 100"><path d="M30 20 V80 M30 20 H55 Q75 20 75 40 T55 60 H30 M50 60 L75 85 M75 35 Q75 50 55 50 T35 65" fill="none" stroke="#F9F8F4" stroke-width="8" stroke-linecap="round"/></svg>
    </div>

    <header class="top-nav">
        <nav class="nav-links">
            <a href="insight.html">INSIGHT</a>
            <a href="studio.html">STUDIO</a>
            <a href="education.html">EDUCATION</a>
            <a href="game/index.html">GAME</a>
        </nav>
        
        <div class="nav-actions">
            <div class="lang-control">
                <svg class="nav-icon" viewBox="0 0 24 24" id="langBtn"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                <div class="lang-menu" id="langMenu">
                    <span onclick="setLang('en')">ENGLISH</span>
                    <span onclick="setLang('zh')">中文</span>
                    <span onclick="setLang('jp')">日本語</span>
                    <span onclick="setLang('es')">ESPAÑOL</span>
                    <span onclick="setLang('fr')">FRANÇAIS</span>
                </div>
            </div>
            
            <a href="login.html" class="auth-control" title="Sign In">
                <svg class="nav-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
        </div>
    </header>

    <div class="page-header"><h1 id="page-title">RESPACE DISASTER</h1></div>

    <script>
        const translations = {
            en: "RESPACE DISASTER",
            zh: "韧空间防灾", 
            jp: "レスペース防災",
            es: "RESPACE DESASTRE",
            fr: "RESPACE DÉSASTRE"
        };

        const langBtn = document.getElementById('langBtn');
        const langMenu = document.getElementById('langMenu');
        const titleEl = document.getElementById('page-title');

        langBtn.onclick = (e) => {
            e.stopPropagation();
            langMenu.style.display = langMenu.style.display === 'flex' ? 'none' : 'flex';
        };

        function setLang(l) {
            localStorage.setItem('respace_lang', l);
            applyLang(l);
            langMenu.style.display = 'none';
        }

        function applyLang(l) {
            // 核心修复：确保如果传入值无效，回退到英文
            const targetLang = translations[l] ? l : 'en';
            titleEl.innerText = translations[targetLang];
            document.documentElement.lang = targetLang;
        }

        document.onclick = () => { langMenu.style.display = 'none'; };

        // 核心优化：确保默认加载必为英文（除非用户有明确记录）
        window.onload = () => { 
            let savedLang = localStorage.getItem('respace_lang');
            
            // 如果是第一次访问，或者存储的值不在我们的翻译包里，强制为 en
            // 这避免了用户在第一次访问时看到错误的语言代码，或者在存储了无效值后看到空白
            if (!savedLang || !translations[savedLang]) {
                savedLang = 'en';
            }
            
            applyLang(savedLang); 
        };
    </script>
</body>
</html>
